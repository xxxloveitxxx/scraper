<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lead Scraper</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      width: 450px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #333;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      padding: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      color: #333;
      outline: none;
      transition: border 0.2s;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    input[type="number"] {
      width: 70px;
    }

    textarea:focus, input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .row > div {
      flex: 1;
    }

    .status-box {
      background: #e3f2fd;
      border-left: 4px solid #2563eb;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #888;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #2563eb;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-box {
      background: white;
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
      border-radius: 4px;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      color: #2563eb;
    }

    .stat-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 600;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: white;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #f9f9f9;
    }

    .btn-secondary:disabled {
      background: #f5f5f5;
      color: #999;
      cursor: not-allowed;
    }

    .log-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 12px;
      font-family: monospace;
      line-height: 1.5;
    }

    .log-entry {
      margin: 4px 0;
      word-break: break-word;
    }

    .log-info { color: #2563eb; }
    .log-success { color: #16a34a; }
    .log-error { color: #dc2626; }
    .log-warn { color: #ea580c; }

    .alert {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #92400e;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert strong {
      display: block;
      margin-bottom: 6px;
    }

    .log-title {
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lead Scraper</h1>
  </div>

  <div class="container">
    <!-- Status -->
    <div class="status-box">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number" id="stat-cities">0</div>
        <div class="stat-label">Cities</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-links">0</div>
        <div class="stat-label">Found</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-scraped">0</div>
        <div class="stat-label">Scraped</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-failed">0</div>
        <div class="stat-label">Failed</div>
      </div>
    </div>

    <!-- Alert -->
    <div class="alert" id="captcha-alert">
      <strong>CAPTCHA Detected</strong>
      <span id="captcha-msg">Please solve the CAPTCHA and click Continue</span>
    </div>

    <!-- Cities Input -->
    <div class="form-group">
      <label class="form-label">Target Cities (one per line)</label>
      <textarea id="cities" placeholder="New York, NY&#10;Los Angeles, CA&#10;Chicago, IL"></textarea>
    </div>

    <!-- Settings -->
    <div class="form-group">
      <label class="form-label">Scraping Settings</label>
      <div class="row">
        <div>
          <label class="form-label">Max Businesses</label>
          <input type="number" id="maxBusinesses" value="30" min="1">
        </div>
        <div>
          <label class="form-label">Max Pages</label>
          <input type="number" id="maxPages" value="2" min="1">
        </div>
        <div>
          <label class="form-label">Delay (sec)</label>
          <input type="number" id="delay" value="4" min="1">
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button id="btn-start" class="btn-primary">Start Scraping</button>
      <button id="btn-stop" class="btn-secondary" disabled>Stop</button>
      <button id="btn-export" class="btn-secondary" disabled>Export CSV</button>
    </div>

    <!-- Continue After CAPTCHA -->
    <button id="btn-continue" class="btn-primary" style="width: 100%; display: none; margin-bottom: 16px;">Continue After CAPTCHA</button>

    <!-- Log -->
    <div>
      <div class="log-title">Activity Log</div>
      <div class="log-box" id="log"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
